<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
  <meta charset='utf-8'>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,maximum-scale=2">
  <link rel="stylesheet" type="text/css" media="screen" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  {% seo %}
  {% include head-custom.html %}
  </head>
  <body>
  <div id="header_wrap" class="outer">
    <header class="inner">
    <h1 id="project_title"><a href="{{ site.baseurl }}/">{{ site.title | default: site.github.repository_name }}</a></h1>
    <h2 id="project_tagline">{{ site.description | default: site.github.project_tagline }}</h2>
    {% if site.repository %}<a id="github_link" href="{{ site.repository }}"><i class="fa-brands fa-github"></i> GitHub</a>{% endif %}
    </header>
  </div>
  <div id="main_content_wrap" class="outer">
    <div class="inner">
    <section id="main_content" class="landing-content">
      {{ content }}
    </section>
    </div>
  </div>
  <div id="footer_wrap" class="outer">
    <footer class="inner">
    <p>Published with <a href="https://pages.github.com">GitHub Pages</a></p>
    </footer>
  </div>
  <script>
  fetch('{{ site.baseurl }}/versions.json')
    .then(function(r) { return r.json(); })
    .then(function(versions) {
    var ul = document.getElementById('version-list');
    if (!ul) return;
    ul.innerHTML = '';
    versions.forEach(function(v) {
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = v + '/';
      a.textContent = v;
      li.appendChild(a);
      ul.appendChild(li);
    });
    });
  </script>
  </body>
</html>
