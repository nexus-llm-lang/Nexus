<!-- MathJax 3 for rendering proof trees and type system rules -->
<script>
MathJax = {
  loader: {load: ['[tex]/html']},
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    packages: {'[+]': ['html']},
    macros: {
      textsc: ['\\mathrm{#1}', 1]
    }
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
  },
  chtml: {
    mtextFont: "serif",
  },
  svg: {
    mtextFont: "serif"
  }
};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<style>
/* Allow wide proof trees to scroll horizontally instead of breaking layout */
mjx-container[jax="CHTML"][display="true"] {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 0.5em 0;
}
.smallcaps {
  font-variant-caps: small-caps;
}
/* Override MathJax 84.2% scaling on text-mode elements */
mjx-utext[style*="font-size"] {

}
</style>
