name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Use the same Nix dev-shell setup as CI so the wasmtime version that
      # builds the polyglot is the one this repo is tested against. This pins
      # wasmtime via flake.lock + nixpkgs (currently wasmtime 44).
      - uses: ./.github/actions/setup

      - name: Bootstrap polyglot launcher
        run: ./bootstrap.sh

      - name: Smoke test - compile examples/hello.nx
        run: ./nexus build examples/hello.nx -o /tmp/hello.wasm

      - name: Smoke test - run compiled hello.wasm
        run: |
          wasmtime run \
            -W tail-call=y,exceptions=y,function-references=y,stack-switching=y,threads=y,shared-memory=y,max-memory-size=8589934592,max-wasm-stack=33554432 \
            -S threads,cli \
            --dir=. --dir=/tmp \
            /tmp/hello.wasm

      - name: Record wasmtime version used to build
        id: wasmtime_version
        run: |
          version=$(wasmtime --version | awk '{ print $2 }')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            nexus
            nexus.wasm
          body: |
            # Nexus ${{ github.ref_name }}

            Self-extracting POSIX sh + WebAssembly polyglot compiler.

            ## Install

            ```sh
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/nexus
            chmod +x nexus
            mv nexus ~/.local/bin/   # or anywhere on PATH
            ```

            ## Requirements

            [`wasmtime`](https://wasmtime.dev/) must be installed and on `PATH`.
            This release was built and smoke-tested against **wasmtime ${{ steps.wasmtime_version.outputs.version }}**;
            any wasmtime version with stable `stack-switching`, `tail-call`, `exceptions`,
            `function-references`, and `threads`/`shared-memory` proposals will work.

            ```sh
            curl https://wasmtime.dev/install.sh -sSf | bash
            ```

            ## Smoke test

            ```sh
            cat > hello.nx <<'EOF'
            import { Console, system_handler } from "std:stdio"

            let main = fn () -> unit require { PermConsole } do
              inject system_handler do
                Console.println(val: "hello from nexus")
              end
            end
            EOF

            ./nexus build hello.nx -o hello.wasm
            wasmtime run -Scli hello.wasm
            ```

            ## Assets

            - `nexus` &mdash; polyglot launcher (POSIX sh header + embedded `nexus.wasm` + `lsp.wasm`).
              This is the only file most users need.
            - `nexus.wasm` &mdash; the raw compiler module, in case you want to invoke
              it directly with `wasmtime run nexus.wasm ...`.
