name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            cores = 0
      - uses: determinateSystems/magic-nix-cache-action@main
      - uses: nicknovitski/nix-develop@v1
      - name: Run Rust tests
        run: cargo test --quiet
      - name: Run tree-sitter corpus tests
        run: cd tree-sitter-nexus && tree-sitter test
      - name: Ensure generated parser artifacts are up to date
        run: |
          cd tree-sitter-nexus && tree-sitter generate
          git diff --exit-code tree-sitter-nexus
      - name: Format
        run: |
          cargo fmt -- --check
          nix fmt -- --ci
