name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            cores = 0
            max-substitution-jobs = 32
            http-connections = 50
            download-buffer-size = 2560000
      - uses: nix-community/cache-nix-action@main
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
      - uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
      - uses: nicknovitski/nix-develop@v1
      - name: Run Rust tests
        run: cargo test --release --quiet
      - name: Run tree-sitter corpus tests
        run: cd tree-sitter-nexus && tree-sitter test
      - name: Ensure generated parser artifacts are up to date
        run: |
          cd tree-sitter-nexus && tree-sitter generate
          git diff --exit-code tree-sitter-nexus
      - name: Format
        run: |
          cargo fmt -- --check
          nix fmt -- --ci
