name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: Build dependencies
        working-directory: bootstrap
        run: cargo build --release --lib

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache: "false"
      - name: cargo fmt
        working-directory: bootstrap
        run: cargo fmt -- --check
      - name: nix fmt
        run: nix fmt -- --ci

  test-unit:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: unit tests
        working-directory: bootstrap
        run: cargo test --release --lib --bins -- --quiet

  test-typecheck:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: typecheck tests
        working-directory: bootstrap
        run: cargo test --release --test integration "typecheck::" -- --quiet

  test-compile:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: compile tests
        working-directory: bootstrap
        run: cargo test --release --test integration "compile::" -- --quiet
      - name: IR tests
        working-directory: bootstrap
        run: cargo test --release --test integration "ir::" -- --quiet
      - name: runtime tests
        working-directory: bootstrap
        run: cargo test --release --test integration "runtime::" -- --quiet

  test-stdlib:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: stdlib tests
        working-directory: bootstrap
        run: cargo test --release --test integration "stdlib::" -- --quiet

  bootstrap:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: bootstrap verification (stage0 → stage1 → stage2)
        run: ./bootstrap.sh --ci

  test-nx:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: Build Rust bootstrap
        run: cargo build --release --manifest-path bootstrap/Cargo.toml
      - name: Build self-hosted nexus.wasm
        run: ./bootstrap/target/release/nexus build src/driver.nx -o nexus.wasm
      - name: Run .nx tests via `nexus test`
        run: |
          wasmtime run \
            -W tail-call=y,exceptions=y,function-references=y,stack-switching=y,component-model=y,max-memory-size=8589934592 \
            -S http,inherit-network \
            --dir=. --dir="${TMPDIR:-/tmp}" \
            nexus.wasm test tests/ \
              --nexus-bin "$(pwd)/bootstrap/target/release/nexus" \
              --junit junit-nx.xml
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nx-junit
          path: junit-nx.xml
