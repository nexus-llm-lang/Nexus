name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: Build dependencies
        working-directory: bootstrap
        run: cargo build --release --lib

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache: "false"
      - name: cargo fmt
        working-directory: bootstrap
        run: cargo fmt -- --check
      - name: nix fmt
        run: nix fmt -- --ci

  test-unit:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: unit tests
        working-directory: bootstrap
        run: cargo test --release --lib --bins -- --quiet

  test-typecheck:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: typecheck tests
        working-directory: bootstrap
        run: cargo test --release --test integration "typecheck::" -- --quiet

  test-compile:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: compile tests
        working-directory: bootstrap
        run: cargo test --release --test integration "compile::" -- --quiet
      - name: IR tests
        working-directory: bootstrap
        run: cargo test --release --test integration "ir::" -- --quiet
      - name: runtime tests
        working-directory: bootstrap
        run: cargo test --release --test integration "runtime::" -- --quiet

  test-stdlib:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: stdlib tests
        working-directory: bootstrap
        run: cargo test --release --test integration "stdlib::" -- --quiet

  bootstrap-and-seed-verify:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: bootstrap verification (stage0 → stage1 → stage2) + seed match (ADR 0001)
        run: ./bootstrap.sh --ci
      - name: Negative test — corrupted ./nexus.wasm must fail --ci
        run: |
          # Self-test of the seed-mismatch check. Stage 0/1/2 must still succeed
          # (so we point NEXUS_SEED at a pristine copy), then we corrupt
          # ./nexus.wasm in place so the post-fixed-point cmp fails.
          cp ./nexus.wasm /tmp/real-seed.wasm
          # Truncate by 1 byte: still a different file from stage1.wasm, but no
          # need to reload it as a wasm module — only the cmp reads it.
          truncate -s -1 ./nexus.wasm
          set +e
          NEXUS_SEED=/tmp/real-seed.wasm ./bootstrap.sh --ci > /tmp/poison.log 2>&1
          rc=$?
          set -e
          # Restore the committed seed so any downstream job sees a clean tree.
          cp /tmp/real-seed.wasm ./nexus.wasm
          if [[ "$rc" -eq 0 ]]; then
            echo "FAIL: corrupted ./nexus.wasm run exited 0; seed-mismatch check did not trigger." >&2
            cat /tmp/poison.log >&2
            exit 1
          fi
          if ! grep -q 'Seed mismatch' /tmp/poison.log; then
            echo "FAIL: corrupted ./nexus.wasm run did not emit 'Seed mismatch' guidance." >&2
            cat /tmp/poison.log >&2
            exit 1
          fi
          echo "OK: corrupted ./nexus.wasm run failed as expected."
          tail -20 /tmp/poison.log

  test-nx:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: Build Rust bootstrap
        run: cargo build --release --manifest-path bootstrap/Cargo.toml
      - name: Build self-hosted nexus.wasm
        run: ./bootstrap/target/release/nexus build src/driver.nx -o nexus.wasm
      - name: Run .nx tests via `nexus test`
        run: |
          wasmtime run \
            -W tail-call=y,exceptions=y,function-references=y,stack-switching=y,component-model=y,max-memory-size=8589934592 \
            -S http,inherit-network \
            --dir=. --dir="${TMPDIR:-/tmp}" \
            nexus.wasm test tests/ \
              --nexus-bin "$(pwd)/bootstrap/target/release/nexus" \
              --junit junit-nx.xml
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nx-junit
          path: junit-nx.xml
