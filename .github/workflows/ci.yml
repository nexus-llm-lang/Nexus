name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Canonical wasmtime `-W` feature-flag set. Must stay in lock-step with
# `header.sh`'s `W_FLAGS` and `bootstrap.sh`'s `WASMTIME_FLAGS_CORE`.
# `threads=y,shared-memory=y` are required by the lazy-parallel `@`
# code path (WASI threads); omitting them breaks parallel-thunk tests.
# `-S threads=y` enables the WASI-side wasi-threads imports.
env:
  WASMTIME_W_FLAGS: tail-call=y,exceptions=y,function-references=y,stack-switching=y,threads=y,shared-memory=y,max-memory-size=8589934592,max-wasm-stack=33554432
  WASMTIME_S_FLAGS: threads=y

jobs:
  bootstrap-and-seed-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: bootstrap verification (stage0 -> stage1 -> stage2) + seed match (ADR 0001)
        run: ./bootstrap.sh --ci
      - name: Negative test - corrupted ./nexus.wasm must fail --ci
        run: |
          # Self-test of the seed-mismatch check. Stage 0/1/2 must still succeed
          # (so we point NEXUS_SEED at a pristine copy), then we corrupt
          # ./nexus.wasm in place so the post-fixed-point cmp fails.
          cp ./nexus.wasm /tmp/real-seed.wasm
          # Truncate by 1 byte: still a different file from stage1.wasm, but no
          # need to reload it as a wasm module - only the cmp reads it.
          truncate -s -1 ./nexus.wasm
          set +e
          NEXUS_SEED=/tmp/real-seed.wasm ./bootstrap.sh --ci > /tmp/poison.log 2>&1
          rc=$?
          set -e
          # Restore the committed seed so any downstream job sees a clean tree.
          cp /tmp/real-seed.wasm ./nexus.wasm
          if [[ "$rc" -eq 0 ]]; then
            echo "FAIL: corrupted ./nexus.wasm run exited 0; seed-mismatch check did not trigger." >&2
            cat /tmp/poison.log >&2
            exit 1
          fi
          if ! grep -q 'Seed mismatch' /tmp/poison.log; then
            echo "FAIL: corrupted ./nexus.wasm run did not emit 'Seed mismatch' guidance." >&2
            cat /tmp/poison.log >&2
            exit 1
          fi
          echo "OK: corrupted ./nexus.wasm run failed as expected."
          tail -20 /tmp/poison.log
      - name: Verify --install flag
        run: |
          TMPPREFIX=$(mktemp -d)
          ./bootstrap.sh --install "$TMPPREFIX"
          test -x "$TMPPREFIX/bin/nexus"
          "$TMPPREFIX/bin/nexus" --help | grep -q 'build'
          # Smoke: compile a small fixture via the system-installed binary
          tmpout=$(mktemp /tmp/nexus_install_smoke_XXXXXX.wasm)
          trap 'rm -f "$tmpout"' EXIT
          "$TMPPREFIX/bin/nexus" build tests/_fixtures/hello.nx -o "$tmpout"
          test -s "$tmpout"
          echo "OK: --install smoke passed."

  test-nx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build self-host via committed seed
        run: ./bootstrap.sh
      - name: Run .nx tests via `nexus test`
        run: ./nexus test tests/ --junit junit-nx.xml
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nx-junit
          path: junit-nx.xml

  lint:
    runs-on: ubuntu-latest
    needs: bootstrap-and-seed-verify
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build self-host via committed seed
        run: ./bootstrap.sh
      - name: Run linter over src/ and nxlib/
        run: ./nexus lint --check src/ nxlib/
      - name: Check for import cycles in .nx source tree
        run: bash scripts/check-import-cycles.sh
      - name: Check for degenerate @-immediate-force patterns (nexus-p2d8.11)
        run: bash scripts/check-degenerate-thunks.sh

  bench-perf:
    runs-on: ubuntu-latest
    needs: bootstrap-and-seed-verify
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build self-host via committed seed
        run: ./bootstrap.sh
      - name: Run bench suite and check against baseline (nexus-lzfy, g0h5 Phase 2)
        # --iters 2: two iterations per bench suppress outlier noise without
        # making CI wallclock blow up.  WASI-thread variance is inherent but
        # the bench suite uses sequential code only (see bench.nx WASI note).
        # Exit 3 means at least one bench drifted > ±20% of bench-baseline.json.
        run: ./nexus bench --baseline bench-baseline.json --iters 2

  fmt-check:
    runs-on: ubuntu-latest
    needs: bootstrap-and-seed-verify
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build self-host via committed seed
        run: ./bootstrap.sh
      - name: Check formatting of all .nx sources (excluding known-bad fixtures)
        run: |
          # One fixture is permanently excluded:
          #   lex_line_comment_eof_column.nx  — intentionally no trailing newline
          fail=0
          while IFS= read -r f; do
            if ! ./nexus fmt --check "$f"; then
              fail=$((fail + 1))
            fi
          done < <(find src/ nxlib/ tests/ examples/ -name '*.nx' \
            -not -path 'tests/negative/parser/lex_line_comment_eof_column.nx')
          if [ "$fail" -gt 0 ]; then
            echo "fmt-check: $fail file(s) would be reformatted" >&2
            exit 1
          fi

  examples-smoke:
    runs-on: ubuntu-latest
    needs: bootstrap-and-seed-verify
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build self-host via committed seed
        run: ./bootstrap.sh
      - name: Compile every positive example
        run: |
          # nexus build cannot write to /dev/null (wasm sandbox); use a temp file.
          tmpout=$(mktemp /tmp/nexus_smoke_XXXXXX.wasm)
          trap 'rm -f "$tmpout"' EXIT
          fail=0
          for f in examples/*.nx examples/feature/*.nx; do
            case "$f" in
              # nexus-vrrc: math.nx is a library module (no main); not an
              # executable smoke target.
              examples/math.nx)
                echo "SKIP (library-no-main) $f"
                continue
                ;;
            esac
            if ./nexus build "$f" -o "$tmpout" 2>&1; then
              echo "OK $f"
            else
              echo "FAIL $f"
              fail=$((fail + 1))
            fi
          done
          if [ "$fail" -gt 0 ]; then
            echo "examples-smoke: $fail failure(s)" >&2
            exit 1
          fi
