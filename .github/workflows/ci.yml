name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: Build dependencies
        working-directory: bootstrap
        run: cargo build --release --lib

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache: "false"
      - name: cargo fmt
        working-directory: bootstrap
        run: cargo fmt -- --check
      - name: nix fmt
        run: nix fmt -- --ci

  tree-sitter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache: "false"
      - name: tree-sitter test
        working-directory: tree-sitter
        run: tree-sitter test
      - name: tree-sitter generate (check up to date)
        working-directory: tree-sitter
        run: |
          tree-sitter generate
          git diff --exit-code

  test-unit:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: unit tests
        working-directory: bootstrap
        run: cargo test --release --lib --bins -- --quiet

  test-typecheck:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: typecheck tests
        working-directory: bootstrap
        run: cargo test --release --test integration "typecheck::" -- --quiet

  test-compile:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: compile tests
        working-directory: bootstrap
        run: cargo test --release --test integration "compile::" -- --quiet
      - name: IR tests
        working-directory: bootstrap
        run: cargo test --release --test integration "ir::" -- --quiet
      - name: runtime tests
        working-directory: bootstrap
        run: cargo test --release --test integration "runtime::" -- --quiet

  test-stdlib:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: stdlib tests
        working-directory: bootstrap
        run: cargo test --release --test integration "stdlib::" -- --quiet

  bootstrap:
    needs: build-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          rust-cache-shared-key: cargo-deps
      - name: bootstrap verification (stage0 → stage1 → stage2)
        run: ./bootstrap.sh --ci
