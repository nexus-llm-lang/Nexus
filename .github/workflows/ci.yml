name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-and-seed-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: bootstrap verification (stage0 -> stage1 -> stage2) + seed match (ADR 0001)
        run: ./bootstrap.sh --ci
      - name: Negative test - corrupted ./nexus.wasm must fail --ci
        run: |
          # Self-test of the seed-mismatch check. Stage 0/1/2 must still succeed
          # (so we point NEXUS_SEED at a pristine copy), then we corrupt
          # ./nexus.wasm in place so the post-fixed-point cmp fails.
          cp ./nexus.wasm /tmp/real-seed.wasm
          # Truncate by 1 byte: still a different file from stage1.wasm, but no
          # need to reload it as a wasm module - only the cmp reads it.
          truncate -s -1 ./nexus.wasm
          set +e
          NEXUS_SEED=/tmp/real-seed.wasm ./bootstrap.sh --ci > /tmp/poison.log 2>&1
          rc=$?
          set -e
          # Restore the committed seed so any downstream job sees a clean tree.
          cp /tmp/real-seed.wasm ./nexus.wasm
          if [[ "$rc" -eq 0 ]]; then
            echo "FAIL: corrupted ./nexus.wasm run exited 0; seed-mismatch check did not trigger." >&2
            cat /tmp/poison.log >&2
            exit 1
          fi
          if ! grep -q 'Seed mismatch' /tmp/poison.log; then
            echo "FAIL: corrupted ./nexus.wasm run did not emit 'Seed mismatch' guidance." >&2
            cat /tmp/poison.log >&2
            exit 1
          fi
          echo "OK: corrupted ./nexus.wasm run failed as expected."
          tail -20 /tmp/poison.log

  test-nx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build self-host via committed seed
        run: ./bootstrap.sh
      - name: Run .nx tests via `nexus test`
        run: |
          wasmtime run \
            -W tail-call=y,exceptions=y,function-references=y,stack-switching=y,component-model=y,max-memory-size=8589934592 \
            -S http,inherit-network \
            --dir=. --dir="${TMPDIR:-/tmp}" \
            nexus.wasm test tests/ \
              --nexus-bin "$(pwd)/nexus" \
              --junit junit-nx.xml
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nx-junit
          path: junit-nx.xml
