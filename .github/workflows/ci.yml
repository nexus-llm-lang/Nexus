name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Canonical wasmtime `-W` feature-flag set. Must stay in lock-step with
# `header.sh`'s `W_FLAGS` and `bootstrap.sh`'s `WASMTIME_FLAGS_CORE`.
# `threads=y,shared-memory=y` are required by the lazy-parallel `@`
# code path (WASI threads); omitting them breaks parallel-thunk tests.
# `-S threads=y` enables the WASI-side wasi-threads imports.
env:
  WASMTIME_W_FLAGS: tail-call=y,exceptions=y,function-references=y,stack-switching=y,threads=y,shared-memory=y,max-memory-size=8589934592,max-wasm-stack=33554432
  WASMTIME_S_FLAGS: threads=y

jobs:
  bootstrap-and-seed-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: bootstrap verification (stage0 -> stage1 -> stage2) + committed seed match
        run: ./bootstrap.sh --ci
      - name: Verify --install flag
        run: |
          TMPPREFIX=$(mktemp -d)
          ./bootstrap.sh --install "$TMPPREFIX"
          test -x "$TMPPREFIX/bin/nexus"
          "$TMPPREFIX/bin/nexus" --help | grep -q 'build'
          # Smoke: compile a small example via the system-installed binary.
          # mktemp (no explicit /tmp) lands in $TMPDIR, which the launcher
          # preopens into the wasmtime sandbox.
          tmpout=$(mktemp --suffix=.wasm)
          trap 'rm -f "$tmpout"' EXIT
          "$TMPPREFIX/bin/nexus" build examples/hello.nx -o "$tmpout"
          test -s "$tmpout"
          echo "OK: --install smoke passed."

  test-nx:
    runs-on: ubuntu-latest
    needs: bootstrap-and-seed-verify
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run .nx tests via `nexus test`
        run: ./nexus test tests/ --junit junit-nx.xml
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nx-junit
          path: junit-nx.xml

  comment-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Reject bd issue IDs in source comments
        run: |
          # Source comments must not contain bd issue IDs (nexus-XXXX pattern).
          # Explanatory prose is fine; the ID token alone must be stripped.
          # Exclusions: nexus-lang, nexus-lsp, nexus-cli, nexus-generated are
          # legitimate module-name substrings, not issue references.
          if grep -rnE '//.*\bnexus-[a-z0-9]{4}\b' src nxlib --include='*.nx' \
               | grep -qvE 'nexus-lang|nexus-lsp|nexus-cli|nexus-generated'; then
            echo "ERROR: source comments contain bd issue IDs. Strip the ID token but keep the explanatory prose." >&2
            grep -rnE '//.*\bnexus-[a-z0-9]{4}\b' src nxlib --include='*.nx' \
              | grep -vE 'nexus-lang|nexus-lsp|nexus-cli|nexus-generated' >&2
            exit 1
          fi
      - name: Reject bare spec line-number citations in source comments
        run: |
          # Spec references must use rule names (e.g. §T-Cmp), not raw line numbers.
          # Patterns like "[Ss]pec line NNN" or "line NNN-NNN" (range) are forbidden.
          if grep -rnE '//.*\b[Ss]pec line [0-9]+|//.*\bline [0-9]+-[0-9]+' \
               src nxlib --include='*.nx'; then
            echo "ERROR: source comments contain bare spec line-number citations. Use rule names (e.g. §T-Cmp) instead." >&2
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    needs: bootstrap-and-seed-verify
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run linter over src/ and nxlib/
        run: ./nexus lint --check src/ nxlib/

  fmt-check:
    runs-on: ubuntu-latest
    needs: bootstrap-and-seed-verify
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Check formatting of all .nx sources (excluding known-bad fixtures)
        run: |
          # One fixture is permanently excluded:
          #   lex_line_comment_eof_column.nx  — intentionally no trailing newline
          fail=0
          while IFS= read -r f; do
            if ! ./nexus fmt --check "$f"; then
              fail=$((fail + 1))
            fi
          done < <(find src/ nxlib/ tests/ examples/ -name '*.nx' \
            -not -path 'tests/negative/parser/lex_line_comment_eof_column.nx')
          if [ "$fail" -gt 0 ]; then
            echo "fmt-check: $fail file(s) would be reformatted" >&2
            exit 1
          fi

  examples-smoke:
    runs-on: ubuntu-latest
    needs: bootstrap-and-seed-verify
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Compile every positive example
        run: |
          # nexus build cannot write to /dev/null (wasm sandbox); use a temp file.
          # mktemp (no explicit /tmp) lands in $TMPDIR, which the launcher
          # preopens into the wasmtime sandbox.
          tmpout=$(mktemp --suffix=.wasm)
          trap 'rm -f "$tmpout"' EXIT
          fail=0
          for f in examples/*.nx examples/feature/*.nx; do
            case "$f" in
              # nexus-vrrc: math.nx is a library module (no main); not an
              # executable smoke target.
              examples/math.nx)
                echo "SKIP (library-no-main) $f"
                continue
                ;;
            esac
            if ./nexus build "$f" -o "$tmpout" 2>&1; then
              echo "OK $f"
            else
              echo "FAIL $f"
              fail=$((fail + 1))
            fi
          done
          if [ "$fail" -gt 0 ]; then
            echo "examples-smoke: $fail failure(s)" >&2
            exit 1
          fi
