name: Deploy Versioned Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g. v0.1.0). Leave empty to use latest tag.'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying docs for $VERSION"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: gem install jekyll jekyll-seo-tag

      - name: Build versioned site
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd docs
          jekyll build \
            --config _config.yml \
            --baseurl "/nexus/$VERSION" \
            --destination "../_site_versioned"

      - name: Build latest site
        run: |
          cd docs
          jekyll build \
            --config _config.yml \
            --baseurl "/nexus/latest" \
            --destination "../_site_latest"

      - name: Fetch existing gh-pages content
        run: |
          mkdir -p _site_final
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git worktree add _gh_pages gh-pages
            # Copy everything except .git
            rsync -a --exclude='.git' _gh_pages/ _site_final/
            git worktree remove _gh_pages
          fi

      - name: Assemble versioned deploy
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Add versioned docs
          rm -rf "_site_final/$VERSION"
          cp -r _site_versioned "_site_final/$VERSION"

          # Update latest
          rm -rf _site_final/latest
          cp -r _site_latest _site_final/latest

          # Generate version index
          cd _site_final
          VERSIONS=$(ls -d v* 2>/dev/null | sort -rV || true)
          cat > index.html <<'HEADER'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Nexus Documentation</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #e0e0e0; background: #1a1a2e; }
              h1 { border-bottom: 1px solid #333; padding-bottom: 12px; }
              a { color: #79b8ff; text-decoration: none; }
              a:hover { text-decoration: underline; }
              ul { list-style: none; padding: 0; }
              li { padding: 8px 0; }
              .latest { font-weight: bold; }
              .tag { color: #8b949e; font-size: 0.9em; margin-left: 8px; }
            </style>
          </head>
          <body>
            <h1>Nexus Documentation</h1>
            <p><a href="latest/" class="latest">latest</a></p>
            <h2>All Versions</h2>
            <ul>
          HEADER

          for v in $VERSIONS; do
            echo "      <li><a href=\"$v/\">$v</a></li>" >> index.html
          done

          cat >> index.html <<'FOOTER'
            </ul>
          </body>
          </html>
          FOOTER

          # Prevent Jekyll processing on gh-pages
          touch .nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site_final

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
