name: Deploy Versioned Docs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g. v0.1.0). Leave empty to use latest tag."
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          rust-cache: "false"
          nix-develop-arguments: ".#docs"

      - name: Determine version and base path
        id: version
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "repo_name=$REPO_NAME" >> "$GITHUB_OUTPUT"
          echo "Deploying docs for $VERSION (base: /$REPO_NAME)"

      - name: Setup tree-sitter CLI
        uses: tree-sitter/setup-action/cli@v2

      - name: Checkout tree-sitter grammar
        uses: actions/checkout@v6
        with:
          repository: nexus-llm-lang/tree-sitter-grammar
          path: tree-sitter-nexus

      - name: Generate parser and register grammar
        run: |
          cd tree-sitter-nexus
          tree-sitter generate
          cd ..
          mkdir -p ~/.config/tree-sitter
          printf '{"parser-directories": ["%s"]}\n' "$PWD" > ~/.config/tree-sitter/config.json

      - name: Build versioned site
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO_NAME="${{ steps.version.outputs.repo_name }}"
          jekyll build \
              --source docs \
              --config docs/_config.yml \
              --baseurl "/$REPO_NAME/$VERSION" \
              --destination _site_versioned

      - name: Build latest site
        run: |
          REPO_NAME="${{ steps.version.outputs.repo_name }}"
          jekyll build \
              --source docs \
              --config docs/_config.yml \
              --baseurl "/$REPO_NAME/latest" \
              --destination _site_latest

      - name: Fetch existing gh-pages content
        run: |
          mkdir -p _site_final
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git worktree add _gh_pages gh-pages
            rsync -a --exclude='.git' _gh_pages/ _site_final/
            git worktree remove _gh_pages
          fi

      - name: Assemble versioned deploy
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          rm -rf "_site_final/$VERSION"
          cp -r _site_versioned "_site_final/$VERSION"

          rm -rf _site_final/latest
          cp -r _site_latest _site_final/latest

      - name: Build root redirect and versions.json
        run: |
          VERSIONS=$(find _site_final -maxdepth 1 -name 'v*' -type d -printf '%f\n' 2>/dev/null | sort -rV || true)
          REPO_NAME="${{ steps.version.outputs.repo_name }}"

          cat > _site_final/index.html <<REDIRECT
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0;url=/$REPO_NAME/latest/"></head>
          <body><a href="/$REPO_NAME/latest/">Redirecting to latest docs...</a></body>
          </html>
          REDIRECT

          printf '["latest"' > _site_final/versions.json
          for v in $VERSIONS; do
            printf ',"%s"' "$v" >> _site_final/versions.json
          done
          echo ']' >> _site_final/versions.json

          touch _site_final/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site_final

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
