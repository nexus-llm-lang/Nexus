name: Deploy Versioned Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g. v0.1.0). Leave empty to use latest tag.'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            auto-optimise-store = false

      - uses: nix-community/cache-nix-action@main
        with:
          primary-key: nix-docs-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying docs for $VERSION"

      - name: Build versioned site
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          nix develop '.#docs' --command \
            jekyll build \
              --source docs \
              --config docs/_config.yml \
              --baseurl "/nexus/$VERSION" \
              --destination _site_versioned

      - name: Build latest site
        run: |
          nix develop '.#docs' --command \
            jekyll build \
              --source docs \
              --config docs/_config.yml \
              --baseurl "/nexus/latest" \
              --destination _site_latest

      - name: Fetch existing gh-pages content
        run: |
          mkdir -p _site_final
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git worktree add _gh_pages gh-pages
            rsync -a --exclude='.git' _gh_pages/ _site_final/
            git worktree remove _gh_pages
          fi

      - name: Assemble versioned deploy
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          rm -rf "_site_final/$VERSION"
          cp -r _site_versioned "_site_final/$VERSION"

          rm -rf _site_final/latest
          cp -r _site_latest _site_final/latest

      - name: Build version index page
        run: |
          VERSIONS=$(find _site_final -maxdepth 1 -name 'v*' -type d -printf '%f\n' 2>/dev/null | sort -rV || true)

          mkdir -p _index_src
          cat > _index_src/index.md <<'FRONT'
          ---
          layout: default
          title: Nexus Documentation
          ---

          # Nexus Documentation

          **[latest](latest/)**

          ## All Versions
          FRONT
          sed -i 's/^          //' _index_src/index.md

          for v in $VERSIONS; do
            echo "- [$v]($v/)" >> _index_src/index.md
          done

          nix develop '.#docs' --command \
            jekyll build \
              --source _index_src \
              --config docs/_config.yml \
              --baseurl "/nexus" \
              --destination _site_index

          cp _site_index/index.html _site_final/index.html
          cp -r _site_index/assets _site_final/assets 2>/dev/null || true

          touch _site_final/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site_final

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
