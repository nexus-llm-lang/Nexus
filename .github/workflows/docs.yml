name: Deploy Versioned Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g. v0.1.0). Leave empty to use latest tag.'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            auto-optimise-store = false

      - uses: nix-community/cache-nix-action@main
        with:
          primary-key: nix-docs-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying docs for $VERSION"

      - name: Build versioned site
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          nix develop '.#docs' --command \
            jekyll build \
              --source docs \
              --config docs/_config.yml \
              --baseurl "/nexus/$VERSION" \
              --destination _site_versioned

      - name: Build latest site
        run: |
          nix develop '.#docs' --command \
            jekyll build \
              --source docs \
              --config docs/_config.yml \
              --baseurl "/nexus/latest" \
              --destination _site_latest

      - name: Fetch existing gh-pages content
        run: |
          mkdir -p _site_final
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git worktree add _gh_pages gh-pages
            rsync -a --exclude='.git' _gh_pages/ _site_final/
            git worktree remove _gh_pages
          fi

      - name: Assemble versioned deploy
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          rm -rf "_site_final/$VERSION"
          cp -r _site_versioned "_site_final/$VERSION"

          rm -rf _site_final/latest
          cp -r _site_latest _site_final/latest

          # Generate version index
          cd _site_final
          VERSIONS=$(find . -maxdepth 1 -name 'v*' -type d -printf '%f\n' 2>/dev/null | sort -rV || true)
          cat > index.html <<'HEADER'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Nexus Documentation</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #e0e0e0; background: #1a1a2e; }
              h1 { border-bottom: 1px solid #333; padding-bottom: 12px; }
              a { color: #79b8ff; text-decoration: none; }
              a:hover { text-decoration: underline; }
              ul { list-style: none; padding: 0; }
              li { padding: 8px 0; }
              .latest { font-weight: bold; }
            </style>
          </head>
          <body>
            <h1>Nexus Documentation</h1>
            <p><a href="latest/" class="latest">latest</a></p>
            <h2>All Versions</h2>
            <ul>
          HEADER

          for v in $VERSIONS; do
            echo "      <li><a href=\"$v/\">$v</a></li>" >> index.html
          done

          cat >> index.html <<'FOOTER'
            </ul>
          </body>
          </html>
          FOOTER

          touch .nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site_final

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
