name: Deploy Versioned Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g. v0.1.0). Leave empty to use latest tag.'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            auto-optimise-store = false

      - uses: nix-community/cache-nix-action@main
        with:
          primary-key: nix-docs-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}

      - name: Determine version and base path
        id: version
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo 'dev')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "repo_name=$REPO_NAME" >> "$GITHUB_OUTPUT"
          echo "Deploying docs for $VERSION (base: /$REPO_NAME)"

      - name: Build versioned site
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO_NAME="${{ steps.version.outputs.repo_name }}"
          nix develop '.#docs' --command \
            jekyll build \
              --source docs \
              --config docs/_config.yml \
              --baseurl "/$REPO_NAME/$VERSION" \
              --destination _site_versioned

      - name: Build latest site
        run: |
          REPO_NAME="${{ steps.version.outputs.repo_name }}"
          nix develop '.#docs' --command \
            jekyll build \
              --source docs \
              --config docs/_config.yml \
              --baseurl "/$REPO_NAME/latest" \
              --destination _site_latest

      - name: Fetch existing gh-pages content
        run: |
          mkdir -p _site_final
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git worktree add _gh_pages gh-pages
            rsync -a --exclude='.git' _gh_pages/ _site_final/
            git worktree remove _gh_pages
          fi

      - name: Assemble versioned deploy
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          rm -rf "_site_final/$VERSION"
          cp -r _site_versioned "_site_final/$VERSION"

          rm -rf _site_final/latest
          cp -r _site_latest _site_final/latest

      - name: Build version index page
        run: |
          VERSIONS=$(find _site_final -maxdepth 1 -name 'v*' -type d -printf '%f\n' 2>/dev/null | sort -rV || true)

          mkdir -p _index_src
          cp -r docs/assets _index_src/assets 2>/dev/null || true

          cat > _index_src/index.md <<'FRONT'
          ---
          layout: default
          title: Nexus Language
          ---

          <p class="hero-tagline">
          Nexus is a programming language built on one premise: <strong>LLMs are strong at literal program constructs but weak at contextual ones.</strong>
          Garbage collection, implicit conversions, ambient I/O, continuation-based control flow — these contextual mechanisms are where LLM-generated code breaks and where human review fails. Nexus replaces them with syntactically explicit alternatives.
          </p>

          <div class="feature-grid">
          <div class="feature-card">
          <h3>Coeffects</h3>
          <p>Capability requirements declared in function signatures. Dependency injection via ports and handlers — no continuations, no implicit control flow.</p>
          </div>
          <div class="feature-card">
          <h3>Linear Types</h3>
          <p>Resources consumed exactly once. No garbage collector, no finalizers. The compiler tracks every allocation.</p>
          </div>
          <div class="feature-card">
          <h3>Explicit Syntax</h3>
          <p>Keyword-terminated blocks, mandatory borrow annotations, labeled arguments. Every call site means exactly what it says.</p>
          </div>
          <div class="feature-card">
          <h3>WebAssembly</h3>
          <p>Compiles to WASM component model. Permissions map to WASI capabilities, enforced at both compile time and runtime.</p>
          </div>
          </div>

          ## Quick Start

          ```bash
          nexus                    # REPL
          nexus run example.nx     # interpret
          nexus build example.nx   # compile to main.wasm
          nexus check example.nx   # typecheck only
          ```

          ## Hello World

          ```nexus
          import { Console }, * as stdio from stdlib/stdio.nx

          let main = fn () -> unit require { PermConsole } do
              inject stdio.system_handler do
                  Console.println(val: "Hello, Nexus!")
              end
              return ()
          end
          ```

          Everything is explicit: the function requires `PermConsole`, a handler is injected to satisfy it, and `main` returns `unit`.

          <div class="cta-group">
          <a href="latest/" class="btn-cta primary">Documentation (latest)</a>
          <a href="https://github.com/${{ github.repository }}" class="btn-cta secondary">GitHub</a>
          </div>

          ## All Versions
          FRONT
          sed -i 's/^          //' _index_src/index.md

          echo '<ul class="version-list">' >> _index_src/index.md
          for v in $VERSIONS; do
            echo "<li><a href=\"$v/\">$v</a></li>" >> _index_src/index.md
          done
          echo '</ul>' >> _index_src/index.md

          REPO_NAME="${{ steps.version.outputs.repo_name }}"
          nix develop '.#docs' --command \
            jekyll build \
              --source _index_src \
              --config docs/_config.yml \
              --baseurl "/$REPO_NAME" \
              --destination _site_index

          cp _site_index/index.html _site_final/index.html
          cp -r _site_index/assets _site_final/assets 2>/dev/null || true

          touch _site_final/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site_final

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
